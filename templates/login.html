<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — Sistema de Presupuesto</title>
<style>
  :root {
    --primary: #1a3a5c; --primary-light: #2d6a9f;
    --accent:  #e67e22; --bg: #f0f4f8;
    --border:  #d1dbe8; --text: #2c3e50; --muted: #7f8c8d;
    --danger:  #e74c3c; --radius: 8px;
    --shadow:  0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 380px;
    overflow: hidden;
  }

  .login-header {
    background: var(--primary);
    padding: 32px 32px 28px;
    text-align: center;
  }
  .login-header .logo { font-size: 40px; margin-bottom: 10px; }
  .login-header h1 { color: white; font-size: 18px; font-weight: 700; line-height: 1.3; }
  .login-header p  { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px;
                     text-transform: uppercase; letter-spacing: 1px; }

  .login-body { padding: 32px; }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600;
          color: var(--text); margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; outline: none; transition: border .2s, box-shadow .2s;
    background: white; color: var(--text);
  }
  input:focus {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(45,106,159,0.12);
  }

  .btn-login {
    width: 100%; padding: 11px;
    background: var(--primary); color: white;
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background .2s;
    margin-top: 4px;
  }
  .btn-login:hover { background: var(--primary-light); }
  .btn-login:active { transform: scale(.99); }

  .error-box {
    background: #fee2e2; color: #991b1b;
    border: 1px solid #fecaca; border-radius: var(--radius);
    padding: 10px 14px; font-size: 13px;
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }

  .login-footer {
    text-align: center; padding: 16px 32px 24px;
    font-size: 12px; color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* Animación de entrada */
  .login-card { animation: slideUp .3s ease; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="logo">🍋</div>
    <h1>Sistema de Presupuesto<br>de Ingresos</h1>
    <p>Inicia sesión para continuar</p>
  </div>

  <div class="login-body">
    {% if error %}
    <div class="error-box">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="on">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username"
               placeholder="Ingresa tu usuario"
               autocomplete="username"
               autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="Ingresa tu contraseña"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Ingresar →</button>
    </form>
  </div>

  <div class="login-footer">
    Sistema interno · Acceso restringido
  </div>
</div>

</body>
</html>
